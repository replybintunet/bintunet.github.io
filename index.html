<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>  
  <title>BINTUNET.CO.KE | Fast, Reliable Internet</title>  
  <link rel="manifest" href="manifest.json" />  
  <meta name="theme-color" content="#e60000">  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>  
  <link href="https://fonts.cdnfonts.com/css/runtoe" rel="stylesheet"/>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <script src="https://www.paypal.com/sdk/js?client-id=ARX_5m0pm3u1OZyrMoxLijWx3XUN00VwyhZshcPwaixaIWLIwtHZST3-75Gpi-a5CQMsfSO3RjXGOnuS&components=buttons,funding-eligibility&enable-funding=card"></script>

  <style>  
    :root { --primary: #e60000; --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }  
    body { font-family: 'Inter', sans-serif; color: #333; background: #fff; overflow-x: hidden; }  

    /* --- TOASTS --- */
    #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 400px; pointer-events: none; }
    .toast { background: #1a1a1a; color: white; padding: 16px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transform: translateY(-100px); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border-left: 5px solid var(--primary); }
    .toast.show { transform: translateY(0); opacity: 1; }

    /* --- ANIMATIONS ON TAP --- */
    .tap-anim:active { transform: scale(0.92); opacity: 0.8; transition: 0.1s; }
    
    @keyframes logoPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); filter: brightness(1.2); }
      100% { transform: scale(1); }
    }
    .social-icons a:active img { animation: logoPulse 0.3s ease-in-out; }

    /* --- HEADER --- */
    .menu-toggle { position: fixed; top: 20px; left: 20px; background: var(--primary); color: white; padding: 12px 18px; font-family: 'Runtoe', cursive; font-size: 18px; border: none; border-radius: 8px; z-index: 5000; cursor: pointer; box-shadow: 0 4px 15px rgba(230, 0, 0, 0.3); }  
    header { position: relative; height: 60vh; min-height: 400px; color: white; text-align: center; padding-top: 5rem; overflow: hidden; }  
    .header-video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }  
    .header-video-container video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }  
    
    .social-icons { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 6000; }  
    .social-icons a img { width: 32px; height: 32px; border-radius: 6px; transition: 0.3s; }

    .hero-content { position: relative; z-index: 10; }
    .brand { font-family: 'Runtoe', cursive; font-size: 3.2rem; text-transform: uppercase; margin: 10px 0; }  
    .btn-hero { background: white; color: var(--primary); padding: 0.8rem 1.8rem; border-radius: 30px; font-weight: 700; border: none; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }  

    /* --- DRAWERS --- */
    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); visibility: hidden; opacity: 0; transition: var(--transition); z-index: 7000; backdrop-filter: blur(4px); }
    .drawer-overlay.active { visibility: visible; opacity: 1; }
    .nav-drawer { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; height: 85vh; background: #fff; z-index: 7001; transition: var(--transition); border-radius: 32px 32px 0 0; display: flex; flex-direction: column; overflow: hidden; }
    .nav-drawer.active { bottom: 0; }
    .drawer-handle { width: 40px; height: 4px; background: #e0e0e0; border-radius: 10px; margin: 12px auto; flex-shrink: 0; }
    .drawer-header { padding: 5px 25px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; flex-shrink: 0; }

    /* --- UI --- */
    .view-container { flex: 1; position: relative; overflow: hidden; }
    .view-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px 25px; overflow-y: auto; background: #fff; transition: var(--transition); transform: translateX(100%); opacity: 0; }
    .view-screen.active { transform: translateX(0); opacity: 1; }
    .view-screen.prev { transform: translateX(-100%); opacity: 0; }

    .drawer-list { list-style: none; }
    .drawer-list li, .plan-card { padding: 18px 20px; margin-bottom: 12px; border-radius: 16px; background: #fafafa; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
    .drawer-list li:active, .plan-card:active { background: #f0f0f0; }
    
    .input-field, .select-field, .msg-area { width: 100%; padding: 16px; margin: 8px 0; border: 2px solid #f0f0f0; border-radius: 14px; font-size: 16px; font-family: inherit; outline: none; }
    .input-field:focus { border-color: var(--primary); }

    /* --- MAP & WHATSAPP --- */
    #coverage-map { height: 100%; width: 100%; border-radius: 20px; }
    .whatsapp-float { position: fixed; bottom: 25px; right: 25px; background: #25d366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; cursor: pointer; z-index: 5000; box-shadow: 0 8px 20px rgba(37,211,102,0.3); transition: 0.3s; }
    .whatsapp-float:active { transform: scale(0.8) rotate(-15deg); }
    footer { padding: 20px; text-align: center; font-size: 11px; color: #999; }
  </style>  
</head>  
<body>  

  <div id="toast-container"></div>
  <button class="menu-toggle tap-anim" onclick="toggleDrawer('mainDrawer')">☰ MENU</button>  

  <header>  
    <div class="header-video-container">  
      <video autoplay muted playsinline loop><source src="background.mp4" type="video/mp4"></video>  
    </div>  

    <div class="social-icons">
      <a href="https://facebook.com/bintunet" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="FB"></a>
      <a href="https://x.com/bintunet" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png" alt="X"></a>
      <a href="https://instagram.com/bintunet" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384063.png" alt="IG"></a>
      <a href="https://tiktok.com/@bintunet" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3046/3046122.png" alt="TK"></a>
    </div>

    <div class="hero-content">
      <img src="https://i.ibb.co/nsg7hnfZ/In-Shot-20250621-220352979.png" alt="Logo" style="max-width: 120px;">  
      <h1 class="brand">BINTUNET.CO.KE</h1>  
      <button class="btn-hero tap-anim" onclick="toggleDrawer('mainDrawer')">GET CONNECTED</button>  
    </div>
  </header>  

  <div class="drawer-overlay" id="overlay" onclick="closeAllDrawers()"></div>
  
  <div class="nav-drawer" id="mainDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header"><h2>BINTUNET</h2><button class="tap-anim" onclick="closeAllDrawers()" style="border:none;background:none;font-size:28px;color:#ccc;">&times;</button></div>

    <div class="view-container">
      <div class="view-screen active" id="screen-main">
        <ul class="drawer-list">
          <li class="tap-anim" onclick="showScreen('screen-plans')"><div><i class="fa-solid fa-wifi" style="margin-right:12px; color:var(--primary);"></i> Browse Plans</div><i class="fa-solid fa-chevron-right"></i></li>
          <li class="tap-anim" onclick="showScreen('screen-hardware')"><div><i class="fa-solid fa-microchip" style="margin-right:12px; color:var(--primary);"></i> Get Hardware</div><i class="fa-solid fa-chevron-right"></i></li>
          <li class="tap-anim" onclick="showScreen('screen-speed')"><div><i class="fa-solid fa-gauge-high" style="margin-right:12px; color:var(--primary);"></i> Speed Test</div><i class="fa-solid fa-chevron-right"></i></li>
          <li class="tap-anim" onclick="showScreen('screen-coverage')"><div><i class="fa-solid fa-map-location-dot" style="margin-right:12px; color:var(--primary);"></i> Coverage Map</div><i class="fa-solid fa-chevron-right"></i></li>
        </ul>
      </div>

      <div class="view-screen" id="screen-speed" style="padding:0;">
        <div style="padding: 15px 25px;"><button class="btn-hero tap-anim" style="background:#f5f5f5; color:#666; margin:0;" onclick="showScreen('screen-main')">← BACK</button></div>
        <iframe src="https://fast.com" style="width:100%; height:100%; border:none;"></iframe>
      </div>

      <div class="view-screen" id="screen-coverage" style="padding: 0;">
        <div style="padding: 15px 25px; display:flex; justify-content:space-between; align-items:center;">
          <button class="btn-hero tap-anim" style="background:#f5f5f5; color:#666; margin:0;" onclick="showScreen('screen-main')">← BACK</button>
          <span style="font-size:12px; font-weight:700; color:#2196F3;">● BLUE = ACTIVE COUNTIES</span>
        </div>
        <div id="coverage-map"></div>
      </div>

      <div class="view-screen" id="screen-plans">
        <button class="btn-hero tap-anim" style="background:#f5f5f5; color:#666; margin-bottom:15px;" onclick="showScreen('screen-main')">← BACK</button>
        <div onclick="initPay('Entry - 2Mbps', 5.00)" class="plan-card tap-anim"><div><strong>2 Mbps</strong></div><span>$5.00</span></div>
        <div onclick="initPay('Standard - 10Mbps', 15.00)" class="plan-card tap-anim"><div><strong>10 Mbps</strong></div><span>$15.00</span></div>
        <div onclick="initPay('Premium - 50Mbps', 35.00)" class="plan-card tap-anim"><div><strong>50 Mbps</strong></div><span>$35.00</span></div>
        <div onclick="initPay('Pro - 300Mbps', 120.00)" class="plan-card tap-anim"><div><strong>300 Mbps</strong></div><span>$120.00</span></div>
      </div>

      <div class="view-screen" id="screen-hardware">
        <button class="btn-hero tap-anim" style="background:#f5f5f5; color:#666; margin-bottom:15px;" onclick="showScreen('screen-main')">← BACK</button>
        <form id="hardwareForm" action="https://formspree.io/f/xldnprkk" method="POST">
          <input type="text" name="name" class="input-field" placeholder="Full Name" required>
          <input type="tel" name="phone" class="input-field" placeholder="Phone Number" required>
          <select name="kit" class="select-field" required>
            <option value="" disabled selected>Hardware Selection</option>
            <option value="Starlink Kit">Starlink Kit</option>
            <option value="Fiber Router">Fiber Router</option>
          </select>
          <input type="text" name="location" class="input-field" placeholder="Location" required>
          <button type="submit" class="btn-hero tap-anim" style="width:100%; background:var(--primary); color:white; height:55px;">SUBMIT ORDER</button>
        </form>
      </div>

      <div class="view-screen" id="screen-pay">
        <button class="btn-hero tap-anim" style="background:#f5f5f5; color:#666; margin-bottom:15px;" onclick="showScreen('screen-plans')">← BACK</button>
        <h3 id="displayPlan">Plan</h3>
        <p id="displayPrice" style="font-weight:700; margin-bottom:15px;"></p>
        <input type="number" id="accNumber" class="input-field" placeholder="Enter Account Number">
        <div id="paypal-button-container"></div>
      </div>
    </div>
  </div>

  <div class="nav-drawer" id="contactDrawer" style="height: 55vh;">
    <div class="drawer-handle"></div>
    <div class="drawer-header"><h2>Support</h2><button class="tap-anim" onclick="closeAllDrawers()" style="border:none;background:none;font-size:28px;color:#ccc;">&times;</button></div>
    <div style="padding: 25px;">
      <textarea id="wpMsg" class="msg-area" placeholder="Message us..."></textarea>
      <button class="btn-hero tap-anim" style="width:100%; background:#25d366; color:white; height:55px;" onclick="sendWhatsApp()">SEND TO WHATSAPP</button>
    </div>
  </div>

  <div class="whatsapp-float tap-anim" onclick="toggleDrawer('contactDrawer')"><i class="fa-brands fa-whatsapp"></i></div>

  <footer>© 2026 BINTUNET KENYA</footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    let selectedPrice = 0;
    let map = null;

    function initMap() {
      if (map) return;
      map = L.map('coverage-map').setView([0.0236, 37.9062], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      const blueStyle = { color: "#2196F3", fillColor: "#2196F3", fillOpacity: 0.5 };
      L.circle([-1.286389, 36.817223], { radius: 30000, ...blueStyle }).addTo(map).bindPopup("Nairobi Active");
      L.circle([0.5143, 35.2697], { radius: 25000, ...blueStyle }).addTo(map).bindPopup("Eldoret Active");
      L.circle([-0.1022, 34.7617], { radius: 25000, ...blueStyle }).addTo(map).bindPopup("Kisumu Active");
    }

    function notify(message, type = 'error') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fa-solid ${type==='error'?'fa-circle-exclamation':'fa-circle-check'}"></i> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 4000);
    }

    function toggleDrawer(id) {
      closeAllDrawers();
      document.getElementById(id).classList.add('active');
      document.getElementById('overlay').classList.add('active');
    }

    function closeAllDrawers() {
      document.querySelectorAll('.nav-drawer').forEach(d => d.classList.remove('active'));
      document.getElementById('overlay').classList.remove('active');
    }

    function showScreen(id) {
      document.querySelectorAll('.view-screen').forEach(s => s.classList.remove('active', 'prev'));
      document.getElementById(id).classList.add('active');
      if (id === 'screen-coverage') setTimeout(initMap, 300);
    }

    function sendWhatsApp() {
      const msg = document.getElementById('wpMsg').value;
      if(!msg) return notify("Type a message first.");
      window.open(`https://wa.me/254729499463?text=${encodeURIComponent(msg)}`, '_blank');
    }

    document.getElementById('hardwareForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const response = await fetch(e.target.action, { method: 'POST', body: new FormData(e.target), headers: {'Accept': 'application/json'}});
      if (response.ok) { notify("Order received!", "success"); e.target.reset(); setTimeout(closeAllDrawers, 2000); }
    });

    function initPay(name, price) {
      selectedPrice = price;
      document.getElementById('displayPlan').innerText = name;
      document.getElementById('displayPrice').innerText = "Total: $" + price.toFixed(2);
      showScreen('screen-pay');
      renderPaypal();
    }

    function renderPaypal() {
      const container = document.getElementById('paypal-button-container');
      container.innerHTML = ''; 
      paypal.Buttons({
        style: { layout: 'vertical', color: 'gold', shape: 'rect' },
        createOrder: (data, actions) => {
          const acc = document.getElementById('accNumber').value;
          if(!acc || acc.length < 5) { notify("Enter Account Number first."); return; }
          return actions.order.create({ purchase_units: [{ amount: { value: selectedPrice.toString() } }] });
        },
        onApprove: (data, actions) => {
          return actions.order.capture().then(() => { notify("Payment successful!", "success"); closeAllDrawers(); });
        }
      }).render('#paypal-button-container');
    }
  </script>
</body>  
</html>
